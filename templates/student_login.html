<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生ポータル - ログイン</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="w-full max-w-md">
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                <div class="p-4 mb-4 rounded-lg 
                    {% if category == 'success' %} bg-green-100 text-green-700
                    {% elif category == 'error' %} bg-red-100 text-red-700
                    {% else %} bg-blue-100 text-blue-700 {% endif %}" role="alert">
                    <p>{{ message }}</p>
                </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('student_login') }}" class="bg-white shadow-lg rounded-xl px-8 pt-6 pb-8 mb-4">
            <h1 class="text-2xl font-bold text-center text-gray-800 mb-6">学生ポータル ログイン</h1>
            
            <div class="mb-4">
                <label for="student_id" class="block text-gray-700 text-sm font-bold mb-2">
                    学生ID (学籍番号)
                </label>
                <input type="text" name="student_id" id="student_id" required
                       class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" placeholder="例: 222521301">
            </div>
            
            <div class="mb-6">
                <label for="password" class="block text-gray-700 text-sm font-bold mb-2">
                    パスワード
                </label>
                <input type="password" name="password" id="password" required
                       class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 mb-3 leading-tight focus:outline-none focus:shadow-outline" placeholder="********">
            </div>
            
            <div class="flex items-center justify-between">
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">
                    ログイン
                </button>
            </div>

            <hr style="margin-top: 2em;">
            <div style="text-align: center; margin-top: 1em;">
                <strong>初めて利用する方:</strong><br>
                <a href="{{ url_for('student_register') }}">
                    ここから初回パスワードを設定してください
                </a>
            </div>
        </form>
    </div>
</body>
</html>
