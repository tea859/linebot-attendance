<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生ポータル</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-6xl mx-auto">
        
        <header class="bg-white p-6 rounded-xl shadow-lg mb-8 border-b-4 border-green-500">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-3xl font-bold text-gray-800">学生ポータル</h1>
                    <p class="text-gray-500 mt-1">ようこそ, {{ student_name }} さん</p>
                </div>
                <a href="{{ url_for('student_logout') }}" class="bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-4 rounded-lg text-sm shadow-md transition duration-150">
                    ログアウト
                </a>
            </div>
        </header>

        <main>
            <h2 class="text-2xl font-bold text-gray-700 mb-4">あなたの出席サマリー (第{{ selected_kiki }}期)</h2>
            
            <div class="bg-white p-6 rounded-xl shadow-xl">
                {% if report_data %}
                    <div class="space-y-6">
                        {% for row in report_data %}
                        <div class="border border-gray-200 p-4 rounded-lg">
                            <h3 class="text-lg font-bold text-gray-800">{{ row.subject }}</h3>
                            <p>出席率: {{ row.attendance_rate }}%</p>
                        </div>
                        {% endfor %}
                    </div>
                {% else %}
                    <p class="text-center text-gray-500 py-8">現在、表示できる出席データがありません。</p>
                {% endif %}
            </div>

            </main>
    </div>
</body>
</html>
