<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初回パスワード設定</title>
    <style>
        body { font-family: sans-serif; max-width: 400px; margin: 2em auto; padding: 1em; border: 1px solid #ccc; border-radius: 8px; }
        .form-group { margin-bottom: 1em; }
        label { display: block; margin-bottom: 0.5em; }
        input[type="text"], input[type="password"] { width: 95%; padding: 8px; }
        .btn { padding: 10px 15px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; width: 100%; }
        h1 { text-align: center; }
        .message { padding: 1em; margin-bottom: 1em; border-radius: 4px; text-align: center; }
        .error { background: #f8d7da; color: #721c24; }
        .success { background: #d4edda; color: #155724; }
        .login-link { text-align: center; margin-top: 1em; }
    </style>
</head>
<body>
    <h1>初回パスワード設定</h1>
    <p style="text-align: center; color: #666;">
        これが最初の1回だけ必要な作業です。
    </p>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="message {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form action="{{ url_for('student_register') }}" method="POST">
        <div class="form-group">
            <label for="student_id">学生ID (例: 222521301)</label>
            <input type="text" id="student_id" name="student_id" required>
        </div>
        <div class="form-group">
            <label for="password">設定したいパスワード</label>
            <input type="password" id="password" name="password" required>
        </div>
        <div class="form-group">
            <label for="password_confirm">パスワード (確認用)</label>
            <input type="password" id="password_confirm" name="password_confirm" required>
        </div>
        <button type="submit" class="btn">パスワードを設定して登録</button>
    </form>

    <div class="login-link">
        <a href="{{ url_for('student_login') }}">すでに登録済みの方（ログイン）</a>
    </div>

</body>
</html>
