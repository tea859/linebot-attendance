<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .table-striped tbody tr:nth-child(odd) {
            background-color: #f9fafb;
        }
    </style>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <header class="bg-white p-6 rounded-xl shadow-lg mb-8 border-b-4 border-red-500 flex justify-between items-center">
            <h1 class="text-3xl font-bold text-gray-800">学生管理</h1>
            <a href="/" class="text-blue-600 hover:text-blue-800 font-medium transition duration-150">← メインメニューに戻る</a>
        </header>

        {% if message %}
            <div class="p-4 mb-6 rounded-lg 
                {% if category == 'success' %} bg-green-100 text-green-700 border border-green-400
                {% elif category == 'error' %} bg-red-100 text-red-700 border border-red-400
                {% endif %}" role="alert">
                <p>{{ message }}</p>
            </div>
        {% endif %}

        <div class="bg-white p-6 rounded-xl shadow-lg mb-8">
            <h2 class="text-xl font-semibold mb-4 text-gray-700">新規学生の追加</h2>
            <form method="POST" action="/manage_students">
                <input type="hidden" name="action" value="add">
                <div class="flex space-x-4">
                    <div class="flex-1">
                        <label for="student_id" class="block text-sm font-medium text-gray-700">学生ID (数字)</label>
                        <input type="number" name="student_id" id="student_id" required
                               class="mt-1 w-full p-2 border border-gray-300 rounded-lg" placeholder="例: 222521301">
                    </div>
                    <div class="flex-1">
                        <label for="student_name" class="block text-sm font-medium text-gray-700">学生名</label>
                        <input type="text" name="student_name" id="student_name" required
                               class="mt-1 w-full p-2 border border-gray-300 rounded-lg" placeholder="例: 青井 溪一郎">
                    </div>
                    <button type="submit" class="self-end bg-blue-600 text-white font-bold py-2 px-6 rounded-lg hover:bg-blue-700 transition duration-150">
                        追加
                    </button>
                </div>
            </form>
        </div>

        <div class="bg-white rounded-xl shadow-lg overflow-hidden">
            <h2 class="text-xl font-semibold text-gray-700 p-6">登録済み学生一覧</h2>
            <table class="min-w-full divide-y divide-gray-200 table-striped">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">学生ID</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">学生名</th>
                        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-200">
                    {% for student in students %}
                    <tr>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{{ student[0] }}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ student[1] }}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-right">
                            <form method="POST" action="/manage_students" class="inline"
                                  onsubmit="return confirm('本当に {{ student[1] }} (ID: {{ student[0] }}) を削除しますか？\nこの学生の出席記録もすべて削除されます！');">
                                <input type="hidden" name="action" value="delete">
                                <input type="hidden" name="student_id" value="{{ student[0] }}">
                                <button type="submit" class="text-red-600 hover:text-red-900 font-medium">削除</button>
                            </form>
                        </td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="3" class="px-6 py-4 text-center text-sm text-gray-500">学生はまだ登録されていません。</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
